# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Build and Release

on:
  push:
    tags:
      - "rel-client"
  workflow_dispatch:

defaults:
  run:
    working-directory: client

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: client

      - name: setup uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          working-directory: client
          cache-dependency-glob: | # optional, default is **/*requirements*.txt
            pyproject.toml
            uv.lock

      - name: build package
        run: uv build

      - id: version
        run: |
          VERSION=$(uv workspace metadata --preview-features workspace-metadata | jq -r '. as $root | .members[] | select(.name == "lookout") | $root.resolution[.id].version')
          echo "version=v$VERSION" >> "$GITHUB_OUTPUT"

      - uses: ./.github/update-tags
        with:
          tag: rel-client

      - uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifactErrorsFailBuild: true
          artifacts: client/dist/*.whl
          omitBody: true
          tag: latest
          name: "Cloak latest"
